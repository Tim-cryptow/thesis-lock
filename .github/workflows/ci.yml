name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    env:
      CLARINET_VERSION: v3.18.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Clarinet
        run: |
          set -euo pipefail
          curl -fSL --retry 5 --retry-all-errors --retry-delay 5 -o clarinet.tar.gz \
            "https://github.com/hirosystems/clarinet/releases/download/${CLARINET_VERSION}/clarinet-linux-x64-glibc.tar.gz"
          tar -xzf clarinet.tar.gz
          chmod +x clarinet
          sudo mv clarinet /usr/local/bin/clarinet
          clarinet --version

      - name: clarinet check
        run: clarinet check

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run contract tests
        run: npm test

      - name: Dependency audit
        run: npm audit --audit-level=high

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Seed env vars from .env.example
        run: cp .env.example .env.local

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit and component tests
        run: npm run test:unit

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Subresource integrity audit
        run: npm run audit:sri

  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Seed env vars from .env.example
        run: cp .env.example .env.local

      - name: Install dependencies
        run: npm ci

      - name: API tests
        run: npm run test:api

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Seed env vars from .env.example
        run: cp .env.example .env.local

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e

  sdk:
    name: SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Dependency audit
        run: npm audit --audit-level=high

  cli:
    name: CLI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            cli/package-lock.json
            sdk/package-lock.json

      # The CLI links thesislock-sdk via file:../sdk, and sdk/dist is not
      # committed, so the SDK must be built before the CLI compiles.
      - name: Build SDK dependency
        working-directory: sdk
        run: |
          npm ci
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Dependency audit
        run: npm audit --audit-level=high
